<article class="contact active" data-page="contact">
  <header>
    <h2 class="h2 article-title">Contact</h2>
  </header>

  <section class="mapbox" data-mapbox>
    <figure>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.3317753533865!2d110.41099247582774!3d-6.970129493030491!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e70f4b1e36d2015%3A0x67e434996ba69488!2sJl.%20Patriot%20VII%2C%20Purwosari%2C%20Kec.%20Semarang%20Utara%2C%20Kota%20Semarang%2C%20Jawa%20Tengah%2050172!5e0!3m2!1sid!2sid!4v1778827677155!5m2!1sid!2sid"
        width="400"
        height="300"
        loading="lazy"
      ></iframe>
    </figure>
  </section>

  <section class="contact-form">
    <h3 class="h3 form-title">Contact Form</h3>

    <form
      method="post"
      action="https://script.google.com/macros/s/AKfycbwMMetCw9SsKNKFO-6tk08BIPQh7f8x63zLAtIIXQbBNlIg9siXe2-qR1R41eEQsGcElw/exec"
      class="form"
      data-form
    >
      <div class="input-wrapper">
        <input
          type="text"
          name="fullname"
          class="form-input"
          placeholder="Full name"
          required
          data-form-input
        />

        <input
          type="email"
          name="email"
          class="form-input"
          placeholder="Email address"
          required
          data-form-input
        />
      </div>

      <textarea
        type="message"
        name="message"
        class="form-input"
        placeholder="Your Message"
        required
        data-form-input
      ></textarea>

      <button class="form-btn" type="submit" disabled>
        <ion-icon name="paper-plane"></ion-icon>
        <span>Send Message</span>
      </button>
    </form>
  </section>
</article>
